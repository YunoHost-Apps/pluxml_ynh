#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "pluxml"
name = "PluXml"
description.en = "Blog or CMS storing data in XML flat files."
description.fr = "Blog ou CMS stockant ses données dans des fichiers XML plats."

version = "5.8.22~ynh2"

maintainers = ["Antoine"]

[upstream]
license = "GPL-2.0-only"
website = "https://www.pluxml.org/"
demo = "https://demo.pluxml.org/"
admindoc = "https://wiki.pluxml.org/"
code = "https://github.com/pluxml/PluXml"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false

sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/pluxml"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.language]
    ask.en = "Default language"
    ask.fr = "Langue par défaut"
    type = "select"
    choices = ["de", "en", "es", "fr", "it", "nl", "oc", "pl", "pt", "ro", "ru"]
    default = "en"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"

[resources]
    [resources.sources.main]
    url = "https://github.com/pluxml/PluXml/archive/refs/tags/v5.8.22.tar.gz"
    sha256 = "a2b203b559dc5f11743aea42f59e32e60b6a0d289b8e8daaab4bc1da210910b4"
    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]
    group = "www-data:r-x"

    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = "php8.4-gd, php8.4-xml"
